<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Assets Preview - Harika & Adithya</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff5f5;
            color: #4a4a4a;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #d4a373; margin-bottom: 30px; }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .asset-card {
            margin-bottom: 50px;
            text-align: center;
        }
        .asset-card h2 {
            font-size: 1.2rem;
            color: #8b5e34;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .description {
            margin-top: 15px;
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>Harika & Adithya Engagement - Design Assets</h1>
    <div class="container">
        
        <div class="asset-card">
            <h2>Watercolor Background</h2>
            <img src="assets/harika_adithya_background_1776530738775.png" alt="Background">
            <p class="description">Clean watercolor wash for main sections.</p>
        </div>

        <div class="asset-card">
            <h2>Floral Border</h2>
            <img src="assets/harika_adithya_floral_border_1776530754742.png" alt="Floral Border">
            <p class="description">Elegant roses and eucalyptus for framing elements.</p>
        </div>

        <div class="asset-card">
            <h2>Accent Element</h2>
            <img src="assets/harika_adithya_accent_element_1776530769013.png" alt="Accent Element">
            <p class="description">Gold rings accent for "About" or "Story" section.</p>
        </div>

    </div>
</body>
</html>
