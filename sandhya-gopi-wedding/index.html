<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandhya Rani Bridal Moments Live</title>
    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Join us live as we celebrate these beautiful pre-wedding rituals filled with tradition and joy.">
    <meta property="og:title" content="Sandhya Rani Bridal Moments Live">
    <meta property="og:description"
        content="Join us live as we celebrate these beautiful pre-wedding rituals filled with tradition and joy.">
    <meta property="og:image" content="https://eventcast.pro/sandhya-gopi-wedding/seo_thumbnail.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://eventcast.pro/sandhya-gopi-wedding/seo_thumbnail.jpg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Supabase Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="loader">
        <div class="loader-content">
            <h1 class="logo-text">S & G</h1>
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Animated Overlays -->
    <canvas id="petal-canvas"></canvas>
    <div class="confetti-overlay" id="confetti-container"></div>

    <main>
        <!-- HERO SECTION -->
        <section id="hero" class="fade-in">
            <div class="floral-frame tl"></div>
            <div class="floral-frame tr"></div>
            <div class="floral-frame bl"></div>
            <div class="floral-frame br"></div>

            <div class="hero-content">
                <p class="invite-header">
                    <span>Welcome to the</span>
                    <span>Wedding Celebrations of</span>
                </p>

                <div class="hero-wreath">
                    <img src="wreath.webp" alt="Floral Wreath" class="wreath-img">
                    <div class="names-overlay">
                        <div class="initials">S & G</div>
                    </div>
                </div>

                <div class="full-names-container">
                    <h1 class="couple-full-names">
                        <span class="first-name">Sandhya Rani</span>
                        <span class="weds">&</span>
                        <span class="second-name">Gopi</span>
                    </h1>
                    <p class="event-title" style="font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--gold); margin-top: 20px; letter-spacing: 5px;">Bridal Moments</p>
                </div>
            </div>
        </section>

        <!-- LIVESTREAM SECTION -->
        <section id="livestream" class="reveal">
            <div class="section-header">
                <h2 class="section-title">Bridal Moments Live</h2>
            </div>

            <div class="stream-tabs" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 30px;">
                <button id="btn-day1" class="btn active-tab" onclick="switchStream('day1')" style="padding: 10px 25px; border-radius: 50px; border: 2px solid var(--gold); background: var(--gold); color: white; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; transition: all 0.3s;">Day 1</button>
                <button id="btn-day2" class="btn" onclick="switchStream('day2')" style="padding: 10px 25px; border-radius: 50px; border: 2px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; transition: all 0.3s;">Day 2</button>
            </div>

            <div class="video-container" id="main-stream-container">
                <iframe id="stream-iframe" src="https://www.youtube.com/embed/hnkKBOl9EB4" title="Bridal Moments" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen></iframe>
            </div>

        </section>

        <!-- CHAT / WISHES SECTION -->
        <section id="chat-section" class="reveal">
            <div class="content-card">
                <h2 class="section-title">Wishes Wall</h2>
                <p class="section-subtitle">Send your blessings to the happy couple</p>

                <form id="wishes-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <input type="text" id="wish-name" placeholder="Your Name" required>
                        </div>
                        <div class="input-group">
                            <textarea id="wish-message" rows="3" placeholder="Write your message here..."
                                required></textarea>
                        </div>
                        <button type="submit" class="btn primary-btn">Send Message <i
                                class="fas fa-paper-plane"></i></button>
                    </div>
                </form>

                <div id="wishes-list" class="wishes-scroll-area">
                    <!-- Wishes will appear here -->
                </div>
            </div>
        </section>

        <!-- MAP SECTION -->
        <section id="map-section" class="reveal">
            <h2 class="section-title">Locate the Venue</h2>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d8611.965936036855!2d79.98829881653378!3d15.951203906154213!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a4a8c95e09abf53%3A0xd0ff11ba809030b2!2sKomminenivaripalem%2C%20Andhra%20Pradesh%20523260!5e0!3m2!1sen!2sin!4v1775768825818!5m2!1sen!2sin" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="action-buttons" style="margin-top: 30px;">
                <a href="https://maps.app.goo.gl/ZuHLPZDP2vmHDhZ7A" target="_blank" class="btn map-btn">
                    <i class="fas fa-location-dot"></i> Open in Google Maps
                </a>
            </div>
        </section>

        <!-- FOOTER & PHOTOGRAPHER -->
        <footer>
            <div class="photographer-section">
                <!-- <img src="ashok_logo.png" alt="Logo" class="photographer-logo"> -->
                <h3 class="studio-name">Eeshitha Digitals</h3>
                <div class="contact-info">
                    <a href="tel:9010307507"><i class="fas fa-phone"></i> 90103 07507</a>
                </div>
            </div>

            <div class="legal">
                <p>&copy; 2026 Powered by Eventcast.pro</p>
            </div>
        </footer>
    </main>

    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="script.js"></script>
</body>

</html>
